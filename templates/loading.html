<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnderBot - Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #050508;
            color: #FFFFFF;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: #12121A;
            border-radius: 16px;
            border: 1px solid #2A2A4A;
            max-width: 500px;
        }
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #6C3CE1, #FF2D95);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        p { color: #A8A8C8; font-size: 1.1rem; line-height: 1.6; }
        .loader {
            width: 100%;
            height: 4px;
            background: #1A1A2E;
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
        }
        .loader-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #6C3CE1, #FF2D95);
            border-radius: 2px;
            animation: loading 2s ease-in-out infinite;
        }
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EnderBot</h1>
        <p>{{ message }}</p>
        <div class="loader"><div class="loader-bar"></div></div>
    </div>
</body>
</html>
