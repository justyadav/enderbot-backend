services:
  - type: web
    name: enderbot-backend
    runtime: python
    repo: https://github.com/yourusername/enderbot-backend
    plan: free
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: USE_MONGODB
        value: false
      - key: BOT_VERSION
        value: 2.0.0
      - key: SUPPORT_SERVER_URL
        value: https://discord.gg/PGwbyWX3DS
      - key: PORT
        value: 10000
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
